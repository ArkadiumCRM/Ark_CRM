  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

/\n@font-face {\n  font-family: 'Libre Baskerville';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"bf2fbc4e-dcac-4820-955c-aa8260638e2a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Libre Baskerville';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"7dd8c8ad-e1b5-4774-9a60-e5f4d5903d1e\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Libre Baskerville';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bf2fbc4e-dcac-4820-955c-aa8260638e2a\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>/* ARK CRM — Editorial Hybrid Design System\n   Dark + Light Mode. Dual-theme palette derived from ARK CI + Arkadium-Diagnostik editorial style.\n*/\n\n/* === TOKENS === */\n[data-theme=\"light\"] {\n  --bg:#F4F5F7; --surface:#FFFFFF; --surface-elev:#FFFFFF;\n  --border:#E2E5EA; --border-strong:#C8CDD6;\n  --text:#1A1F2E; --text-mid:#4A5568; --text-light:#8A95A8;\n  --accent:#1A3A5C; --accent-mid:#2D5F8A; --accent-soft:#E8F0F8;\n  --gold:#B8860B; --gold-soft:#FDF6E3;\n  --green:#1A6B4A; --green-soft:#E8F5EF;\n  --red:#C0392B; --red-soft:#FDF0EE;\n  --amber:#D97706; --amber-soft:#FEF3E2;\n  --blue:#2D5F8A; --blue-soft:#E8F0F8;\n  --purple:#6B4A8A; --purple-soft:#F0E8F5;\n  --shadow-sm:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);\n  --shadow:0 4px 12px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);\n  --shadow-lg:0 12px 32px rgba(0,0,0,0.10),0 4px 8px rgba(0,0,0,0.05);\n  --header-bg:#1A3A5C; --header-text:#FFFFFF; --header-text-dim:rgba(255,255,255,0.6);\n}\n[data-theme=\"dark\"] {\n  --bg:#0E1116; --surface:#161B22; --surface-elev:#1D242D;\n  --border:#2A3340; --border-strong:#3A4454;\n  --text:#E6EDF3; --text-mid:#B6C0CC; --text-light:#8A95A8;\n  --accent:#7CB5E8; --accent-mid:#5F9BD1; --accent-soft:rgba(124,181,232,0.12);\n  --gold:#D4A84B; --gold-soft:rgba(212,168,75,0.12);\n  --green:#3FB950; --green-soft:rgba(63,185,80,0.12);\n  --red:#F85149; --red-soft:rgba(248,81,73,0.12);\n  --amber:#D29922; --amber-soft:rgba(210,153,34,0.12);\n  --blue:#58A6FF; --blue-soft:rgba(88,166,255,0.12);\n  --purple:#B084E0; --purple-soft:rgba(176,132,224,0.12);\n  --shadow-sm:0 1px 3px rgba(0,0,0,0.3);\n  --shadow:0 4px 12px rgba(0,0,0,0.4);\n  --shadow-lg:0 12px 32px rgba(0,0,0,0.5);\n  --header-bg:#0A1929; --header-text:#F0F4F8; --header-text-dim:rgba(240,244,248,0.55);\n}\n\n/* === RESET === */\n* { box-sizing:border-box; margin:0; padding:0; }\nbody {\n  font-family:'DM Sans', system-ui, sans-serif;\n  background:var(--bg); color:var(--text); min-height:100vh;\n  font-size:14px; line-height:1.55; -webkit-font-smoothing:antialiased;\n}\n.serif { font-family:'Libre Baskerville', Georgia, serif; }\na { color:var(--accent-mid); text-decoration:none; }\na:hover { color:var(--accent); }\n\n/* === HEADER === */\n.header {\n  background:var(--header-bg); padding:0 32px;\n  display:flex; align-items:stretch; justify-content:space-between;\n  position:sticky; top:0; z-index:100; box-shadow:var(--shadow);\n}\n.header-brand { display:flex; align-items:center; gap:12px; padding:14px 0; }\n.logo-mark {\n  width:32px; height:32px; background:var(--gold); color:#fff;\n  display:flex; align-items:center; justify-content:center;\n  font-family:'Libre Baskerville', serif; font-weight:700; font-size:16px;\n}\n.brand-text { color:var(--header-text); }\n.brand-name {\n  font-family:'Libre Baskerville', serif; font-weight:700;\n  font-size:15px; letter-spacing:0.4px;\n}\n.brand-sub {\n  font-size:9px; letter-spacing:2px; text-transform:uppercase;\n  color:var(--header-text-dim); margin-top:1px;\n}\n.breadcrumb {\n  display:flex; align-items:center; gap:6px; padding:0 24px;\n  color:var(--header-text-dim); font-size:12px;\n}\n.breadcrumb a { color:var(--header-text-dim); }\n.breadcrumb a:hover { color:var(--header-text); }\n.breadcrumb .current { color:var(--header-text); font-weight:500; }\n.breadcrumb .sep { opacity:0.4; }\n\n.header-right { display:flex; align-items:center; gap:12px; padding:14px 0; }\n.cmd-hint {\n  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);\n  padding:4px 10px; font-family:monospace; font-size:11px;\n  color:var(--header-text-dim); border-radius:3px;\n}\n.theme-toggle {\n  background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.15);\n  color:var(--header-text); width:30px; height:30px; border-radius:4px;\n  cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:14px;\n}\n.theme-toggle:hover { background:rgba(255,255,255,0.15); }\n\n/* === PAGE BANNER === */\n.page-banner {\n  background:var(--surface); border-bottom:1px solid var(--border);\n  padding:24px 32px 18px;\n}\n.banner-top {\n  display:flex; align-items:flex-start; gap:20px; margin-bottom:14px;\n}\n.entity-logo {\n  width:96px; height:96px; flex-shrink:0; border-radius:4px;\n  background:var(--accent-soft); color:var(--accent);\n  display:flex; align-items:center; justify-content:center;\n  font-family:'Libre Baskerville', serif; font-size:36px; font-weight:700;\n  box-shadow:var(--shadow-sm); letter-spacing:-0.02em;\n}\n.entity-logo img { max-width:80%; max-height:80%; }\n.banner-title { flex:1; }\n.banner-title h1 {\n  font-family:'Libre Baskerville', serif; font-weight:700;\n  font-size:26px; color:var(--accent); letter-spacing:-0.01em;\n  line-height:1.15; margin-bottom:4px;\n}\n.legal-name {\n  font-size:12px; color:var(--text-light); font-style:italic; margin-bottom:6px;\n}\n.aliases {\n  font-size:12px; color:var(--text-light); margin-bottom:6px;\n}\n.aliases strong { color:var(--text-mid); font-style:normal; font-weight:500; margin-right:4px; }\n\n/* === SNAPSHOT BAR (sticky under tabs) === */\n.snapshot-bar {\n  display:grid; grid-template-columns:repeat(6,1fr);\n  background:var(--surface); border-bottom:1px solid var(--border);\n  padding:12px 32px; gap:20px; box-shadow:var(--shadow-sm);\n}\n.snapshot-item {\n  display:flex; flex-direction:column; gap:2px;\n}\n.snapshot-item .lbl {\n  font-size:10px; letter-spacing:1px; text-transform:uppercase;\n  color:var(--text-light); font-weight:500;\n}\n.snapshot-item .val {\n  font-family:'Libre Baskerville', serif; font-size:18px; font-weight:700;\n  color:var(--accent); line-height:1.2; letter-spacing:-0.01em;\n}\n.snapshot-item .delta { font-size:11px; color:var(--text-mid); }\n.snapshot-item .delta.up { color:var(--green); }\n.snapshot-item .delta.down { color:var(--red); }\n\n/* === CLAIM BANNER (über Snapshot, full-width) === */\n.claim-banner {\n  background:var(--amber-soft); color:var(--amber); border-bottom:1px solid var(--amber);\n  padding:10px 32px; font-size:13px; font-weight:500;\n  display:flex; gap:10px; align-items:center; cursor:pointer;\n}\n.claim-banner:hover { background:color-mix(in srgb, var(--amber) 18%, var(--surface)); }\n.claim-banner .spacer { flex:1; }\n.claim-banner .arrow { font-size:14px; }\n\n/* === Status Dropdown (Header) === */\n.status-dropdown {\n  background:var(--green-soft); color:var(--green); border:none;\n  padding:4px 10px 4px 11px; border-radius:4px; font-size:11px; font-weight:500;\n  cursor:pointer; font-family:inherit;\n  display:inline-flex; align-items:center; gap:4px;\n}\n.status-dropdown::after { content:'▾'; font-size:9px; opacity:0.7; }\n.status-dropdown:hover { box-shadow:0 0 0 2px color-mix(in srgb, var(--green) 25%, transparent); }\n\n/* === Multi-Toggle (Sparten etc.) === */\n.toggle-group { display:flex; gap:4px; flex-wrap:wrap; }\n.toggle-tag {\n  padding:4px 11px; font-size:11px; font-weight:500; letter-spacing:0.2px;\n  border-radius:3px; cursor:pointer; user-select:none;\n  background:var(--bg); color:var(--text-light); border:1px solid var(--border);\n  transition:all 0.15s;\n}\n.toggle-tag:hover { color:var(--text); border-color:var(--border-strong); }\n.toggle-tag.active {\n  background:var(--accent-soft); color:var(--accent); border-color:var(--accent);\n}\n\n/* === Auto-aggregated chips (read-only, with counts) === */\n.auto-chip {\n  display:inline-flex; align-items:center; gap:5px;\n  padding:3px 9px; border-radius:3px; font-size:11.5px;\n  background:var(--surface-elev); border:1px dashed var(--border-strong);\n  color:var(--text-mid); font-weight:500;\n}\n.auto-chip .count {\n  font-family:'Libre Baskerville', serif; color:var(--accent); font-weight:700;\n}\n.auto-label {\n  font-size:11px; color:var(--text-light); margin-bottom:6px; display:flex; gap:6px; align-items:center;\n}\n.auto-label::before { content:'⟳'; opacity:0.6; }\n\n/* === Collapsible card === */\n.card.collapsible .card-head { cursor:pointer; user-select:none; }\n.card.collapsible .card-head::before {\n  content:'▾'; font-size:11px; color:var(--text-light); margin-right:8px;\n  transition:transform 0.2s;\n}\n.card.collapsed .card-head::before { transform:rotate(-90deg); }\n.card.collapsed .card-head { border-bottom:none; padding-bottom:0; margin-bottom:0; }\n.card.collapsed > *:not(.card-head) { display:none; }\n\n/* === Logo clickable === */\n.entity-logo.clickable { cursor:pointer; transition:all 0.15s; }\n.entity-logo.clickable:hover {\n  box-shadow:0 0 0 2px var(--accent-soft), var(--shadow-sm);\n  transform:scale(1.02);\n}\n\n/* === AI Draft State === */\n.card.ai-draft {\n  box-shadow:0 0 0 2px var(--gold), var(--shadow-sm);\n  position:relative;\n}\n.card.ai-draft::before {\n  content:'AI DRAFT'; position:absolute; top:-9px; left:16px;\n  background:var(--gold); color:#fff; font-size:10px; font-weight:600;\n  letter-spacing:1.5px; padding:2px 8px; border-radius:2px;\n}\n.ai-confirm-bar {\n  margin-top:14px; padding:10px 12px; background:var(--gold-soft);\n  border-radius:3px; display:flex; gap:10px; align-items:center;\n  font-size:12.5px; color:var(--text);\n}\n.ai-confirm-bar .spacer { flex:1; }\n\n/* === Refresh Hint Banner === */\n.refresh-hint {\n  background:var(--accent-soft); border-left:3px solid var(--accent);\n  padding:12px 16px; font-size:13px; color:var(--text);\n  display:flex; gap:10px; align-items:center; border-radius:3px;\n  margin-bottom:16px;\n}\n.refresh-hint .spacer { flex:1; }\n.refresh-hint strong { color:var(--accent); }\n\n/* === Score Slider (with AI range) === */\n.score-row { margin-bottom:16px; font-size:12.5px; }\n.score-row .row-head {\n  display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;\n}\n.score-row .row-head .val {\n  font-family:'Libre Baskerville',serif; font-weight:700; color:var(--accent);\n}\n.score-slider-wrap {\n  position:relative; height:24px; display:flex; align-items:center;\n}\n.score-slider-track {\n  position:absolute; left:0; right:0; top:10px; height:4px;\n  background:var(--border); border-radius:2px;\n}\n.score-slider-range {\n  position:absolute; top:10px; height:4px;\n  background:color-mix(in srgb, var(--gold) 40%, transparent);\n  border-radius:2px; pointer-events:none;\n}\n.score-slider-fill {\n  position:absolute; left:0; top:10px; height:4px;\n  background:var(--accent); border-radius:2px; pointer-events:none;\n}\n.score-slider-thumb {\n  position:absolute; top:2px; width:20px; height:20px; border-radius:50%;\n  background:var(--accent); border:3px solid var(--surface);\n  box-shadow:var(--shadow-sm); cursor:grab; transform:translateX(-50%);\n}\n.score-ai-range {\n  font-size:10.5px; color:var(--gold); letter-spacing:0.3px; margin-top:6px;\n  display:flex; gap:8px; align-items:center;\n}\n.score-ai-range::before { content:'⚡'; font-size:11px; }\n\n/* === Version Nav === */\n.version-nav {\n  display:flex; gap:8px; align-items:center; font-size:12px;\n}\n.version-nav button {\n  background:none; border:1px solid var(--border-strong); color:var(--text-mid);\n  width:24px; height:24px; border-radius:3px; cursor:pointer; font-family:inherit;\n}\n.version-nav button:hover { border-color:var(--accent); color:var(--accent); }\n.version-nav button:disabled { opacity:0.4; cursor:not-allowed; }\n\n/* === Edit Mode === */\n.card.editing {\n  background:linear-gradient(0deg, var(--accent-soft) 0%, var(--surface) 12%);\n  box-shadow:0 0 0 2px var(--accent-soft), var(--shadow);\n}\n.card.editing .card-title { color:var(--accent); }\n.edit-input {\n  width:100%; padding:6px 10px; font-size:13px; font-family:inherit;\n  background:var(--surface); color:var(--text);\n  border:1px solid var(--border-strong); border-radius:3px;\n}\n.edit-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-soft); }\n.edit-textarea { min-height:60px; resize:vertical; }\n.edit-multi {\n  display:flex; flex-wrap:wrap; gap:4px; padding:6px 8px;\n  background:var(--surface); border:1px solid var(--border-strong); border-radius:3px;\n  min-height:32px;\n}\n.edit-multi .tag {\n  background:var(--accent-soft); color:var(--accent); border-color:var(--accent);\n  padding-right:4px;\n}\n.edit-multi .tag .x {\n  margin-left:4px; cursor:pointer; opacity:0.5; padding:0 3px;\n}\n.edit-multi .tag .x:hover { opacity:1; color:var(--red); }\n.edit-multi input {\n  flex:1; min-width:120px; border:none; outline:none; padding:2px;\n  background:transparent; color:var(--text); font-family:inherit; font-size:12.5px;\n}\n.edit-hint {\n  font-size:11px; color:var(--text-light); margin-top:4px; font-style:italic;\n}\n\n/* === Sub-Tabs (lila — Teamrad-Style) === */\n.subtabs {\n  display:flex; gap:0; background:var(--surface); border- sparent 50px, var(--border) 50px, var(--border) 51px, transparent 51px); }\n\n.status-pill {\n  padding:2px 8px; font-size:10.5px; font-weight:600; border-radius:3px;\n  text-transform:uppercase; letter-spacing:0.5px;\n}\n.status-pill.besetzt { background:var(--green-soft); color:var(--green); }\n.status-pill.vakant { background:var(--amber-soft); color:var(--amber); }\n.status-pill.geplant {\n  background:var(--blue-soft); color:var(--blue);\n  border:1px dashed var(--blue);\n}\n\n/* === Org-Chart (Tree) === */\n.orgchart-wrap {\n  overflow-x:auto; padding:30px 20px; background:var(--surface); border-radius:4px;\n  box-shadow:var(--shadow-sm);\n}\n.orgchart, .orgchart ul, .orgchart li {\n  list-style:none; margin:0; padding:0; position:relative;\n}\n.orgchart { padding-top:0; text-align:center; display:flex; justify-content:center; }\n.orgchart ul { padding-top:24px; display:flex; justify-content:center; position:relative; }\n.orgchart > li > ul { padding-top:24px; }\n.orgchart li {\n  padding:0 10px 24px; position:relative;\n}\n/* Parent → children vertical line */\n.orgchart li::before, .orgchart li::after {\n  content:''; position:absolute; top:0; height:24px; border-top:1px solid var(--border-strong);\n}\n.orgchart li::before { right:50%; left:0; }\n.orgchart li::after { left:50%; right:0; }\n/* Single-child: no split */\n.orgchart li:only-child::before, .orgchart li:only-child::after { display:none; }\n.orgchart li:only-child { padding-top:0; }\n/* First/Last: clean edges */\n.orgchart li:first-child::before, .orgchart li:last-child::after { border-top:none; }\n.orgchart li:first-child::after { border-top-left-radius:2px; }\n.orgchart li:last-child::before { border-top-right-radius:2px; }\n/* Vertical line from parent down */\n.orgchart li .org-box::before {\n  content:''; position:absolute; top:-24px; left:50%; width:1px; height:24px;\n  background:var(--border-strong);\n}\n.orgchart > li > .org-box::before { display:none; }\n\n.org-box {\n  display:inline-block; background:var(--surface); border:1px solid var(--border);\n  border-radius:4px; padding:10px 14px; font-size:12px; min-width:160px; max-width:200px;\n  box-shadow:var(--shadow-sm); text-align:left; position:relative;\n}\n.org-box.besetzt { border-left:3px solid var(--green); }\n.org-box.vakant { border-left:3px solid var(--amber); background:var(--amber-soft); }\n.org-box.geplant { border-left:3px dashed var(--blue); background:var(--blue-soft); }\n.org-box.board { border-left:3px solid var(--red); background:var(--red-soft); }\n.org-box .role {\n  font-weight:600; color:var(--text); margin-bottom:3px; line-height:1.25;\n}\n.org-box .name {\n  color:var(--text-mid); font-size:11.5px;\n}\n.org-box .name.empty { font-style:italic; color:var(--text-light); }\n.org-box .meta {\n  font-size:10px; color:var(--text-light); letter-spacing:0.3px;\n  margin-top:4px; text-transform:uppercase;\n}\n\n/* Toggle states */\n.view-list { display:block; }\n.view-chart { display:none; }\n.stellenplan.chart-view .view-list { display:none; }\n.stellenplan.chart-view .view-chart { display:block; }\n.chart-toggle-btn.active {\n  background:var(--accent); color:#fff; border-color:var(--accent);\n}\n\n/* === Teamrad — Control-Bar + Sections === */\n.team-control {\n  background:var(--surface); border-radius:2px; box-shadow:var(--shadow-sm);\n  margin-bottom:24px; overflow:hidden; position:sticky; top:88px; z-index:40;\n  border-top:2px solid var(--accent);\n}\n.team-control-row {\n  padding:14px 18px; display:flex; gap:14px; align-items:center; flex-wrap:wrap;\n  border-bottom:1px solid var(--border);\n}\n.team-control-row:last-child { border-bottom:none; }\n.team-control .mode-toggle {\n  display:inline-flex; background:var(--bg); border-radius:3px; padding:2px; gap:2px;\n}\n.team-control .mode-btn {\n  padding:5px 12px; font-size:11.5px; font-weight:500; border:none; cursor:pointer;\n  background:transparent; color:var(--text-mid); border-radius:2px; font-family:inherit;\n}\n.team-c round:var(--gold-soft); color:var(--gold); border-color:var(--gold); }\n.team-member-chip.candidate .av { background:var(--gold); }\n\n/* Teamrad Sections — editorial / executive search aesthetic */\n.tr-section {\n  background:var(--surface); border-radius:2px; box-shadow:var(--shadow-sm);\n  margin-bottom:20px; overflow:hidden; position:relative;\n  border-top:1px solid var(--border);\n}\n.tr-head {\n  padding:20px 24px 16px; display:flex; align-items:baseline; gap:14px;\n  cursor:pointer; user-select:none; border-bottom:1px solid var(--border);\n}\n.tr-head .num {\n  font-family:'Libre Baskerville', serif; font-size:12px; font-weight:400;\n  color:var(--accent); letter-spacing:2px; flex-shrink:0; min-width:32px;\n  border-right:1px solid var(--border); padding-right:12px;\n}\n.tr-head .title-block { flex:1; }\n.tr-head h4 {\n  font-family:'Libre Baskerville', serif; font-size:17px; color:var(--accent);\n  font-weight:700; margin:0; line-height:1.25; letter-spacing:-0.01em;\n}\n.tr-head .sub {\n  font-size:11px; color:var(--text-light); margin-top:4px; font-style:italic;\n}\n.tr-head .spacer { flex:1; }\n.tr-head .caret { font-size:11px; color:var(--text-light); transition:transform 0.2s; }\n.tr-section.collapsed .tr-head .caret { transform:rotate(-90deg); }\n.tr-section.collapsed .tr-head { border-bottom:none; }\n.tr-body { padding:22px 24px 24px; }\n.tr-section.collapsed .tr-body { display:none; }\n\n.tr-ai {\n  font-size:12.5px; color:var(--text-mid); line-height:1.65;\n  padding:14px 18px; background:var(--bg); border-radius:2px;\n  border-left:1px solid var(--accent); margin-top:18px;\n  font-style:italic;\n}\n.tr-ai strong { color:var(--text); font-style:normal; }\n\n.tr-two-col { display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start; }\n\n/* Striped detail bars */\n.detail-bars { display:flex; flex-direction:column; gap:10px; font-size:12.5px; }\n.detail-bar-row { display:flex; align-items:center; gap:10px; }\n.detail-bar-label { width:160px; color:var(--text-mid); }\n.detail-bar-track {\n  flex:1; height:12px; background:var(--bg); border-radius:6px; position:relative; overflow:hidden;\n}\n.detail-bar-track::after {\n  content:''; position:absolute; inset:0; background:repeating-linear-gradient(90deg,transparent 0,transparent 9.5%,rgba(255,255,255,.10) 9.5%,rgba(255,255,255,.10) 10.5%,transparent 10.5%);\n  z-index:2; pointer-events:none; border-radius:6px;\n}\n.detail-bar-fill {\n  height:100%; border-radius:6px; opacity:0.85; transition:width 0.6s ease;\n}\n.detail-bar-val { width:42px; font-family:'Libre Baskerville',serif; font-size:13px; font-weight:700; text-align:right; }\n\n/* DISC wheel refinement */\n.disc-wheel-wrap {\n  display:flex; justify-content:center; align-items:center;\n  padding:10px 0;\n}\n.disc-wheel-legend {\n  display:grid; grid-template-columns:1fr 1fr; gap:8px 14px;\n  font-size:11.5px; margin-top:14px;\n}\n.disc-wheel-legend .lg {\n  display:flex; align-items:center; gap:6px;\n}\n.disc-wheel-legend .dot {\n  width:10px; height:10px; border-radius:50%; flex-shrink:0;\n}\n\n/* Heatmap — editorial monotone */\n.tr-heatmap { display:grid; gap:1px; font-size:11.5px; background:var(--border); }\n.tr-heatmap > div { background:var(--surface); padding:10px 12px; }\n.tr-heatmap .hdr {\n  font-size:10px; color:var(--text-light); font-weight:500;\n  text-transform:uppercase; letter-spacing:1.2px; text-align:center;\n}\n.tr-heatmap .row-label { font-size:12px; color:var(--text-mid); font-weight:500; }\n.tr-heatmap .cell {\n  text-align:center; font-family:'Libre Baskerville',serif; font-weight:700; font-size:13px;\n  position:relative;\n}\n.tr-heatmap .cell .dot {\n  display:inline-block; width:6px; height:6px; border-radius:50%;\n  background:var(--accent); margin-left:5px; vertical-align:middle;\n  opacity:0.3;\n}\n.tr-heatmap .cell.v-high { color:var(--accent); }\n.tr-heatmap .cell.v-high .dot { opacity:1; }\n.tr-heatmap .cell.v-mid { color:var(--text-mid); }\n.tr-heatmap .cell.v ckground:var(--bg);\n  display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:13px;\n}\n.comm-item.call .icon { background:var(--green-soft); color:var(--green); }\n.comm-item.email .icon { background:var(--accent-soft); color:var(--accent); }\n.comm-item.meeting .icon { background:var(--gold-soft); color:var(--gold); }\n.comm-item.linkedin .icon { background:var(--purple-soft); color:var(--purple); }\n.comm-item .body { flex:1; }\n.comm-item .date { font-size:11px; color:var(--text-light); }\n.comm-item .subj { font-weight:500; margin-top:1px; }\n.comm-item .snippet { color:var(--text-mid); margin-top:4px; line-height:1.55; }\n\n.comm-filter {\n  display:flex; gap:6px; margin-bottom:12px;\n}\n.comm-filter .chip { cursor:pointer; }\n.comm-filter .chip.active { background:var(--accent); color:#fff; }\n\n/* === Empty State (within card) === */\n.empty-mini {\n  text-align:center; padding:14px 8px; color:var(--text-light);\n  font-size:13px; line-height:1.6;\n}\n.empty-mini button { margin-top:8px; }\n\n/* === SOFT-BLOCK BANNER === */\n.soft-block {\n  background:var(--amber-soft); color:var(--amber); border-left:3px solid var(--amber);\n  padding:10px 32px; font-size:12.5px; display:flex; gap:8px; align-items:center;\n}\n.soft-block.red { background:var(--red-soft); color:var(--red); border-color:var(--red); }\n.soft-block .spacer { flex:1; }\n.soft-block a { color:inherit; text-decoration:underline; font-weight:500; }\n.banner-meta {\n  display:flex; gap:14px; align-items:center; flex-wrap:wrap;\n  color:var(--text-light); font-size:12.5px;\n}\n.banner-meta strong { color:var(--text-mid); font-weight:500; }\n.banner-meta .dot { width:3px; height:3px; border-radius:50%; background:var(--text-light); }\n\n.banner-chips { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }\n.banner-actions { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; }\n\n/* === CHIPS === */\n.chip {\n  padding:4px 11px; font-size:11px; font-weight:500;\n \n}\n.proc-card .pc-sub { margin:3px 0 2px; }\n.proc-card .pc-meta { font-size:10.5px; margin-top:3px; }\n\n/* === STAGE-TRACK (Drawer) === */\n.proc-stage-track {\n  display:grid; grid-template-columns:repeat(9,1fr); gap:4px; margin-top:6px;\n}\n.pst-step {\n  display:flex; flex-direction:column; align-items:center; gap:3px;\n  padding:8px 4px; border-radius:3px; background:var(--bg); border:1px solid var(--border);\n  font-size:10.5px; color:var(--text-light); position:relative;\n}\n.pst-step .pst-num {\n  font-family:'Libre Baskerville', serif; font-size:12px; font-weight:700;\n}\n.pst-step .pst-lbl { font-size:10px; text-align:center; }\n.pst-step .pst-date { font-size:9.5px; letter-spacing:0.3px; }\n.pst-step.done { background:var(--accent-soft); color:var(--accent); border-color:var(--accent-soft); }\n.pst-step.current {\n  background:var(--accent); color:#fff; border-color:var(--accent);\n  box-shadow:0 0 0 2px color-mix(in srgb, var(--accent) 25%, transparent);\n}\n.pst-step.current .pst-date { color:#fff; }\n.pst-step.placement-done {\n  background:var(--gold-soft); color:var(--gold); border-color:var(--gold);\n}\n\n/* === HISTORY-TAB === */\n.hist-timeline { position:relative; }\n.hist-day { margin-bottom:22px; }\n.hist-day-head {\n  font-family:'Libre Baskerville', serif; font-size:12.5px; color:var(--accent);\n  font-weight:700; letter-spacing:0.4px; text-transform:uppercase;\n  padding-bottom:6px; margin-bottom:10px; border-bottom:1px solid var(--border);\n}\n.hist-row {\n  display:grid; grid-template-columns:60px 130px 1fr; gap:14px; align-items:flex-start;\n  padding:10px 12px; border-radius:3px; margin-bottom:4px; transition:background 0.15s;\n}\n.hist-row:hover { background:var(--bg); }\n.hist-row.hist-warn { background:color-mix(in srgb, var(--red) 5%, var(--surface)); border-left:2px solid var(--red); }\n.hist-row.hist-ok   { background:color-mix(in srgb, var(--gold) 5%, var(--surface)); border-left:2px solid var(--gold); }\n.hist-time {\n  font-family:'Libre Baskerville', serif; font-size:12.5px; color:var(--text-mid);\n  font-variant-numeric:tabular-nums; padding-top:1px;\n}\n.hist-cat { display:flex; align-items:flex-start; }\n.hist-cat-chip {\n  display:inline-block; padding:2px 8px; font-size:10px; letter-spacing:0.4px;\n  text-transform:uppercase; border-radius:2px; font-weight:600; white-space:nowrap;\n}\n.hist-cat-chip.cat-kontakt    { background:color-mix(in srgb, var(--blue) 12%, transparent); color:var(--blue); }\n.hist-cat-chip.cat-erreicht   { background:var(--green-soft); color:var(--green); }\n.hist-cat-chip.cat-email      { background:var(--accent-soft); color:var(--accent); }\n.hist-cat-chip.cat-messaging  { background:color-mix(in srgb, var(--purple) 12%, transparent); color:var(--purple); }\n.hist-cat-chip.cat-interview  { background:var(--accent-soft); color:var(--accent); }\n.hist-cat-chip.cat-placement  { background:var(--gold-soft); color:var(--gold); }\n.hist-cat-chip.cat-refresh    { background:var(--bg); color:var(--text-mid); border:1px solid var(--border); }\n.hist-cat-chip.cat-mandat     { background:var(--gold-soft); color:var(--gold); }\n.hist-cat-chip.cat-erfolgsbasis { background:var(--bg); color:var(--text-mid); border:1px dashed var(--border-strong); }\n.hist-cat-chip.cat-assessment { background:color-mix(in srgb, var(--purple) 12%, transparent); color:var(--purple); }\n.hist-cat-chip.cat-system     { background:var(--bg); color:var(--text-light); border:1px solid var(--border); }\n.hist-body .hist-title { font-size:13px; color:var(--text); margin-bottom:3px; }\n.hist-body .hist-sub { font-size:12px; color:var(--text-mid); line-height:1.55; }\n.hist-body .hist-meta {\n  font-size:11px; color:var(--text-light); margin-top:6px;\n  display:flex; flex-wrap:wrap; gap:4px 8px; align-items:center;\n}\n.hist-body .hist-meta a { color:var(--accent-mid); }\n.hist-body .hist-meta a:hover { color:var(--accent); }\n/* === FILE-TYPE BADGES (Tab 12) === */\n.file-type {\n  display:inline-flex; align-items:center; justify-content:center;\n  width:36px; height:36px; border-radius:3px;\n  font-family:'Libre Baskerville', serif; font-size:10px; font-weight:700;\n  letter-spacing:0.3px; background:var(--accent-soft); color:var(--accent);\n}\n.file-type.ft-pdf  { background:var(--accent-soft); color:var(--accent); }\n.file-type.ft-docx { background:color-mix(in srgb, var(--blue) 12%, transparent); color:var(--blue); }\n.file-type.ft-xlsx { background:var(--green-soft); color:var(--green); }\n.file-type.ft-img  { background:var(--red-soft); color:var(--red); }\n\n/* === REMINDER-TAB === */\n.rem-section { margin-bottom:20px; }\n.rem-section-head {\n  display:flex; align-items:center; gap:10px;\n  padding:8px 12px; margin-bottom:8px;\n}\n.rem-section-head h3 {\n  font-family:'Libre Baskerville', serif; font-size:13px; font-weight:700;\n  letter-spacing:0.3px; color:var(--accent); margin:0;\n}\n.rem-section-head .count {\n  font-size:11px; color:var(--text-light); background:var(--bg);\n  padding:1px 8px; border-radius:10px; border:1px solid var(--border);\n}\n\n.actor-chip {\n  display:inline-block; padding:2px 7px; font-size:10.5px; font-weight:600;\n  background:var(--bg); color:var(--text-mid); border:1px solid var(--border);\n  border-radius:2px; letter-spacing:0.2px;\n}\n\n.hist-body .hist-meta .actor {\n  background:var(--accent-soft); color:var(--accent); padding:1px 6px;\n  border-radius:2px; font-weight:600; font-size:10px; letter-spacing:0.3px;\n}\n\n/* === SYSTEM-ACTOR BADGE (v1.4 — für actor_type <> 'user') === */\n.hist-body .hist-meta .actor.actor-system {\n  background:#e2e8f0; color:#475569;\n  font-family:'SF Mono', Menlo, monospace; font-size:11px;\n  letter-spacing:0; padding:1px 5px 1px 4px;\n}\n.hist-body .hist-meta .actor.actor-system::before {\n  content:'🤖'; margin-right:3px; font-size:10px; opacity:0.85;\n}\n\n/* Source-System-Pill (technische Herkunft bei System-Events) */\n.hist-body .hist-meta .src-badge {\n  display:inline-block; padding:0 5px; font-size:10px; font-weight:500;\n  background:#f1f5f9; color:#64748b; border:1px solid #e2e8f0;\n  border-radius:2px; font-family:'SF Mono', Menlo, monospace;\n  letter-spacing:0.2px;\n}\n.hist-body .hist-meta .src-badge.src-saga { background:#fef3c7; color:#92400e; border-color:#fde68a; }\n.hist-body .hist-meta .src-badge.src-scraper { background:#dbeafe; color:#1e40af; border-color:#bfdbfe; }\n.hist-body .hist-meta .src-badge.src-llm { background:#ede9fe; color:#6d28d9; border-color:#ddd6fe; }\n.hist-body .hist-meta .src-badge.src-batch { background:#e0f2fe; color:#075985; border-color:#bae6fd; }\n.hist-body .hist-meta .src-badge.src-calendar { background:#fce7f3; color:#be185d; border-color:#fbcfe8; }\n.hist-body .hist-meta .src-badge.src-3cx { background:#d1fae5; color:#065f46; border-color:#a7f3d0; }\n\n/* System-Zeile etwas gedämpft darstellen */\n.hist-row.hist-system .hist-title { color:var(--text-mid); font-weight:600; }\n.hist-row.hist-system { border-left:2px solid #e2e8f0; padding-left:10px; }\n\n/* === MINI-TIMELINE (Drawer) === */\n.timeline .tl-item { display:flex; gap:12px; padding:8px 0; position:relative; }\n.timeline .tl-dot {\n  width:8px; height:8px; border-radius:50%; background:var(--accent);\n  margin-top:6px; flex-shrink:0;\n}\n.timeline .tl-body { flex:1; font-size:12.5px; }\n.timeline .tl-head { display:flex; justify-content:space-between; gap:12px; margin-bottom:2px; }\n.timeline .tl-sub { color:var(--text-mid); font-size:12px; line-height:1.55; }\n\n/* ========================================================================= */\n/* RESPONSIVE — Phase 2 Mobile/Tablet (2026-04-17)                           */\n/* ========================================================================= */\n\n/* === Tablet (641–960px): Kompaktere Paddings, KPI 3-col === */\n@media (max-width:960px) and (min-width:641px) {\n  .header { padding:10px 14px; gap:12px; }\n  .page-banner { padding:14px 18px !important; }\n  .page-banner h1 { font-size:20px !important; }\n  .kpi-strip { grid-template-columns:repeat(3,1fr) !important; gap:8px !important; }\n  .filter-bar { flex-wrap:wrap; gap:6px; padding:10px 14px; }\n  .filter-bar input, .filter-bar select { font-size:12px; padding:6px 8px; }\n  .content { padding:14px; }\n}\n\n/* === Mobile (≤ 640px): Header kompakt, KPI 2-col, Tabelle → Karten === */\n@media (max-width:640px) {\n\n  /* Header */\n  .header { padding:8px 12px; flex-wrap:wrap; gap:6px; min-height:auto; }\n  .header-brand .brand-text { display:none; }\n  .header-brand .logo-mark { width:26px; height:26px; font-size:12px; }\n  .breadcrumb { font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }\n  .header-right .cmd-hint { display:none; }\n\n  /* Page-Banner */\n  .page-banner { padding:12px 14px !important; }\n  .page-banner h1 { font-size:18px !important; }\n  .page-banner > div { flex-wrap:wrap !important; gap:8px !important; }\n  .page-banner .btn { font-size:11px; padding:5px 10px; }\n  .page-banner .btn-sm { font-size:11px; }\n\n  /* KPI-Strip: cols-N (3/4/5/6) → 2 */\n  .kpi-strip,\n  .kpi-strip[style*=\"grid-template-columns\"] { grid-template-columns:repeat(2,1fr) !important; gap:6px !important; }\n  .kpi-card { padding:8px !important; }\n  .kpi-label { font-size:9px !important; text-transform:uppercase; letter-spacing:0.5px; }\n  .kpi-value { font-size:16px !important; line-height:1.2; }\n  .kpi-sub { font-size:9.5px !important; }\n\n  /* Filter-Bar: horizontal scrollbar, kompakte Inputs */\n  .filter-bar {\n    flex-wrap:nowrap; overflow-x:auto; -webkit-overflow-scrolling:touch;\n    padding:8px 12px; gap:6px; scrollbar-width:thin;\n  }\n  .filter-bar::-webkit-scrollbar { height:3px; }\n  .filter-bar input, .filter-bar select {\n    font-size:12px; padding:6px 8px; flex:0 0 auto; min-width:120px;\n  }\n  .filter-bar input[type=\"search\"] { min-width:180px; }\n  .chip-group { flex-wrap:nowrap; gap:4px; overflow-x:auto; -webkit-overflow-scrolling:touch; }\n  .chip-group::-webkit-scrollbar { height:3px; }\n  .chip-tab { flex-shrink:0; font-size:11px; padding:4px 10px; }\n\n  /* Content-Padding */\n  .content { padding:10px; }\n\n  /* === DataTable → Card-Stack === */\n  .card table.data-table,\n  table.data-table {\n    display:block; border:none;\n  }\n  .data-table thead { display:none; }\n  .data-table tbody { display:block; }\n  .data-table tr {\n    display:block; padding:12px; margin-bottom:8px;\n    border:1px solid var(--border); border-radius:3px;\n    background:var(--surface); box-shadow:var(--shadow-sm);\n  }\n  .data-table tr:hover td { background:transparent; }\n  .data-table td {\n    display:flex; align-items:center; flex-wrap:wrap;\n    padding:3px 0; border:none; gap:6px; min-height:auto;\n    font-size:12px;\n  }\n  /* Wenn data-label gesetzt (zukünftig), zeige Label vor Wert */\n  .data-table td[data-label]::before {\n    content:attr(data-label) \": \";\n    font-size:10px; text-transform:uppercase; letter-spacing:0.5px;\n    color:var(--text-light); font-weight:600; flex-shrink:0;\n    margin-right:4px;\n  }\n  /* Erstes td (Avatar/Logo) ohne Label, zentriert */\n  .data-table td:first-child {\n    padding-bottom:6px;\n  }\n  /* Zweites td (Primary-Name) full-width, bold, Trenner drunter */\n  .data-table td:nth-child(2) {\n    font-size:14px; font-weight:600;\n    padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:6px;\n    width:100%;\n  }\n  /* „+ N weitere\"-Row voll zentriert */\n  .data-table td[colspan] {\n    display:block; text-align:center; padding:10px; border-bottom:none;\n  }\n  /* Row-Icon-Button ans Ende floaten */\n  .data-table .right,\n  .data-table td.right { justify-content:flex-end; margin-left:auto; }\n\n  /* Cards generell */\n  .card { padding:10px 12px; }\n\n  /* Buttons Touch-Target */\n  .btn { min-height:36px; }\n  .btn.btn-sm { min-height:32px; padding:6px 12px; }\n\n  /* Drawer auf Mobile → Full-Screen-Sheet */\n  .drawer {\n    width:100vw !important; max-width:100vw !important;\n    height:100vh !important; max-height:100vh !important;\n    top:0 !important; right:0 !important; left:0 !important; bottom:0 !important;\n    border-radius:0 !important;\n  }\n  .drawer-head { padding:14px 16px; position:sticky; top:0; background:var(--surface); z-index:5; }\n  .drawer-body, .drawer-section { padding:12px 16px; }\n  .drawer-foot {\n    position:sticky; bottom:0; background:var(--surface);\n    padding:10px 16px; border-top:1px solid var(--border);\n    display:flex; gap:8px; flex-wrap:wrap;\n  }\n\n  /* Snapshot-Bar stacked */\n  .snapshot-bar,\n  [class*=\"snapshot\"] {\n    grid-template-columns:repeat(2,1fr) !important;\n    gap:6px;\n  }\n\n  /* Tab-Bar: horizontal scroll */\n  .tabs, [role=\"tablist\"] {\n    overflow-x:auto; -webkit-overflow-scrolling:touch; white-space:nowrap;\n    flex-wrap:nowrap; gap:4px;\n  }\n  .tabs::-webkit-scrollbar { height:3px; }\n  .tab { flex-shrink:0; padding:8px 12px; font-size:12px; }\n}\n<\u002Fstyle>\n<style>\n/* ===== ADMIN VOLLANSICHT — Scope Styles ===== */\n\n/* Warn-Banner (Admin-Only) */\n.admin-warn { background:color-mix(in srgb,var(--amber) 8%,var(--surface)); border-bottom:2px solid var(--amber); padding:10px 28px; font-size:12px; display:flex; align-items:center; gap:12px; }\n.admin-warn strong { color:var(--amber); font-family:'Libre Baskerville',serif; font-size:13px; letter-spacing:0.3px; }\n\n/* Sub-Tabs (innerhalb Tab-Panel, z.B. Debug-Tab, Email-Tab) */\n.sub-tabs { display:flex; gap:4px; padding:0 0 14px; border-bottom:1px solid var(--border); margin-bottom:18px; flex-wrap:wrap; }\n.sub-tab { padding:8px 14px; font-size:12px; color:var(--text-mid); cursor:pointer; border-bottom:2px solid transparent; font-weight:500; margin-bottom:-1px; }\n.sub-tab:hover { color:var(--accent); }\n.sub-tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:600; }\n.sub-tab .cnt { font-size:10.5px; color:var(--text-light); margin-left:4px; font-family:monospace; }\n.sub-pane { display:none; }\n.sub-pane.active { display:block; }\n\n/* Flag-Row (Feature-Flags, Settings) */\n.flag-row { display:grid; grid-template-columns:1fr 160px 120px 80px; gap:14px; padding:12px 14px; border-bottom:1px solid var(--border); background:var(--surface); align-items:center; }\n.flag-row:last-child { border-bottom:none; }\n.flag-row:hover { background:var(--bg); }\n.flag-key { font-weight:600; font-size:12.5px; color:var(--text); }\n.flag-key code { font-family:monospace; font-size:11px; color:var(--text-light); font-weight:400; display:block; margin-top:2px; }\n.flag-desc { font-size:11px; color:var(--text-light); margin-top:3px; line-height:1.4; }\n.flag-val { font-family:'Libre Baskerville',serif; font-size:16px; font-weight:700; color:var(--accent); }\n.flag-val input[type=\"number\"] { width:80px; padding:4px 6px; font-family:inherit; font-size:13px; border:1px solid var(--border); border-radius:3px; background:var(--bg); color:var(--text); text-align:right; }\n.flag-scope { font-size:10.5px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-light); }\n.flag-edit { text-align:right; }\n\n/* Toggle-Switch */\n.toggle { position:relative; display:inline-block; width:38px; height:20px; }\n.toggle input { opacity:0; width:0; height:0; }\n.toggle .slider { position:absolute; inset:0; background:var(--border-strong); border-radius:20px; cursor:pointer; transition:0.15s; }\n.toggle .slider::before { content:''; position:absolute; height:14px; width:14px; left:3px; top:3px; background:#fff; border-radius:50%; transition:0.15s; }\n.toggle input:checked + .slider { background:var(--accent); }\n.toggle input:checked + .slider::before { transform:translateX(18px); }\n\n/* Section-Groups */\n.sec-group { margin-bottom:24px; }\n.sec-group-head { display:flex; align-items:center; gap:10px; padding:8px 14px; margin-bottom:4px; border-left:3px solid var(--accent); background:var(--bg); border-radius:0 3px 3px 0; }\n.sec-group-head h3 { margin:0; font-size:13px; font-weight:600; color:var(--text); font-family:inherit; }\n.sec-group-head .cnt { font-size:11px; color:var(--text-light); background:var(--surface); padding:1px 8px; border-radius:10px; font-weight:500; }\n.sec-group-body { background:var(--surface); border:1px solid var(--border); border-radius:3px; overflow:hidden; }\n\n/* Generic Data-Table */\n.dt-table { width:100%; border-collapse:collapse; background:var(--surface); border:1px solid var(--border); border-radius:3px; overflow:hidden; }\n.dt-table thead th { padding:10px 12px; background:var(--bg); font-size:10.5px; text-transform:uppercase; letter-spacing:0.8px; color:var(--text-light); font-weight:600; text-align:left; border-bottom:1px solid var(--border); white-space:nowrap; }\n.dt-table tbody td { padding:10px 12px; font-size:12.5px; border-bottom:1px solid var(--border); vertical-align:middle; }\n.dt-table tbody tr:last-child td { border-bottom:none; }\n.dt-table tbody tr:hover { background:var(--bg); cursor:pointer; }\n.dt-table tbody tr.row-disabled { opacity:0.5; }\n.dt-table tbody tr.row-error td { background:color-mix(in srgb,var(--red) 4%,var(--surface)); }\n.dt-table .mono { font-family:monospace; font-size:11px; color:var(--text-mid); }\n.dt-table .t-num { text-align:right; font-variant-numeric:tabular-nums; }\n.dt-table .t-act { text-align:right; white-space:nowrap; }\n.dt-table .t-act .btn { padding:3px 8px; font-size:10.5px; }\n\n/* Status-Badge */\n.s-badge { display:inline-block; font-size:10px; padding:2px 8px; border-radius:2px; font-weight:600; letter-spacing:0.3px; text-transform:uppercase; white-space:nowrap; }\n.s-badge.ok { background:var(--green-soft); color:var(--green); }\n.s-badge.warn { background:var(--amber-soft); color:var(--amber); }\n.s-badge.err { background:var(--red-soft); color:var(--red); }\n.s-badge.off { background:var(--bg); color:var(--text-light); border:1px solid var(--border); }\n.s-badge.info { background:var(--blue-soft); color:var(--blue); }\n.s-badge.purple { background:var(--purple-soft); color:var(--purple); }\n.s-badge.gold { background:var(--gold-soft); color:var(--gold); }\n\n/* Health-Dot */\n.h-dot { display:inline-block; width:8px; height:8px; border-radius:50%; vertical-align:middle; margin-right:6px; }\n.h-dot.ok { background:var(--green); }\n.h-dot.warn { background:var(--amber); }\n.h-dot.err { background:var(--red); animation:pulse 1.4s infinite; }\n.h-dot.off { background:var(--text-light); }\n@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }\n\n/* Code-Block (JSON Preview im Drawer) */\n.code-block { background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:10px 12px; font-family:monospace; font-size:11px; color:var(--text); white-space:pre; overflow-x:auto; line-height:1.5; }\n\n/* Circuit-Breaker-Card */\n.cb-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:12px; }\n.cb-card { background:var(--surface); border:1px solid var(--border); border-radius:3px; padding:14px 16px; }\n.cb-card.tripped { border-color:var(--red); background:color-mix(in srgb,var(--red) 4%,var(--surface)); }\n.cb-card .cb-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }\n.cb-card .cb-name { font-weight:600; font-size:13px; color:var(--text); }\n.cb-card .cb-sub { font-size:11px; color:var(--text-light); margin-top:2px; }\n.cb-card .cb-stats { display:flex; gap:14px; margin-top:10px; font-size:11.5px; color:var(--text-mid); }\n.cb-card .cb-stats strong { color:var(--text); }\n.cb-card .cb-foot { margin-top:10px; display:flex; gap:6px; }\n\n/* Queue-Meter */\n.q-meter { background:var(--bg); border:1px solid var(--border); border-radius:3px; padding:12px 14px; }\n.q-meter-row { display:grid; grid-template-columns:140px 1fr 60px; gap:10px; align-items:center; padding:6px 0; }\n.q-meter-row .lbl { font-size:11.5px; color:var(--text-mid); }\n.q-meter-row .bar { height:6px;  an mich<\u002Fbutton>\n    <button class=\"btn btn-sm\" onclick=\"closeDrawer('notifTmplDrawer')\">Abbrechen<\u002Fbutton>\n    <button class=\"btn btn-sm btn-primary\">Speichern<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- Toast-Host -->\n<div class=\"toast-host\" id=\"toastHost\"><\u002Fdiv>\n\n<script src=\"a1ed9db2-93e6-4a8b-8548-8f5e972ac15b\"><\u002Fscript>\n<script>\nfunction openDrawer(id) {\n  const d = document.getElementById(id);\n  const b = document.getElementById(id.replace('Drawer','Backdrop'));\n  if (d) d.classList.add('open');\n  if (b) b.classList.add('open');\n}\nfunction closeDrawer(id) {\n  const d = document.getElementById(id);\n  const b = document.getElementById(id.replace('Drawer','Backdrop'));\n  if (d) d.classList.remove('open');\n  if (b) b.classList.remove('open');\n}\n\nfunction switchSubTab(id) {\n  const pane = document.getElementById('sub-' + id);\n  if (!pane) return;\n  const parent = pane.parentElement;\n  parent.querySelectorAll(':scope > .sub-pane').forEach(p => p.classList.remove('active'));\n  pane.classList.add('active');\n  // activate matching sub-tab\n  const bar = parent.querySelector(':scope > .sub-tabs');\n  if (bar) {\n    bar.querySelectorAll('.sub-tab').forEach(t => t.classList.remove('active'));\n    const btn = bar.querySelector('[data-sub=\"' + id + '\"]');\n    if (btn) btn.classList.add('active');\n  }\n}\n\n// Rule-Drawer: Trigger-Type umschalten\nfunction toggleRuleTriggerType(val) {\n  const modes = ['event','schedule','field','stale','webhook','manual'];\n  modes.forEach(m => {\n    const el = document.getElementById('rule-trigger-' + m);\n    if (el) el.style.display = (m === val) ? 'block' : 'none';\n  });\n}\n\n// Priority-Seg toggle\ndocument.addEventListener('click', function(e) {\n  const btn = e.target.closest('.prio-seg button, .builder-logic button, .ch-chip, .icon-pick');\n  if (!btn) return;\n  const parent = btn.parentElement;\n  if (btn.classList.contains('ch-chip')) {\n    btn.classList.toggle('active');\n    return;\n  }\n  parent.querySelectorAll('.active').forEach(b => b.classList.remove('active'));\n  btn.classList.add('active');\n});\n\n// Legal-Hold Warn-Demo Toggle\nfunction showToast(msg, type) {\n  const host = document.getElementById('toastHost');\n  const t = document.createElement('div');\n  t.className = 'toast';\n  t.innerHTML = msg;\n  host.appendChild(t);\n  setTimeout(() => t.remove(), 3000);\n}\n\n/* ═══════════ Matching-Gewichte-Editor ═══════════ */\nconst MW_DEFAULTS = [\n  { key:'hard_skills',     label:'Hard-Skills',            sub:'Pflicht-Qualifikationen · Vektor-Match gegen Mandat-Anforderungsprofil', w:25 },\n  { key:'branche',         label:'Branche / Sparte',       sub:'GT · ING · ARCH · Passung zur Mandant-Hauptsparte',                        w:15 },\n  { key:'seniority',       label:'Seniority-Level',        sub:'Junior · Mid · Senior · Principal · Abstand zum Ziel-Level',               w:12 },\n  { key:'region',          label:'Region / Kanton',        sub:'Distanz Arbeitsort ↔ Kandidat-Wohnort (Kantons-Matrix)',                   w:10 },\n  { key:'berufsjahre',     label:'Jahre Berufserfahrung',  sub:'Abgleich mit Mandat-Min/Max · Abweichung abgestuft',                       w:10 },\n  { key:'gehaltsband',     label:'Gehaltsband-Fit',        sub:'Target-Comp (Kandidat) ↔ Salary-Band (Mandat) · Überlappung',              w:10 },\n  { key:'ausbildung',      label:'Ausbildung / Abschluss', sub:'ETH/FH/Lehre/Berufsmatura · Mapping auf Mandat-Mindest-Abschluss',         w:8  },\n  { key:'relocate',        label:'Willingness-to-Relocate',sub:'Bereitschaft · nur relevant wenn Region-Delta > Schwelle',                 w:5  },\n  { key:'fuehrungserf',    label:'Führungserfahrung',      sub:'Jahre Personalverantwortung · nur wenn Mandat Führungsrolle',              w:5  }\n];\n\nfunction mwRender() {\n  const host = document.getElementById('mw-sliders');\n  if (!host) return;\n  host.innerHTML = MW_DEFAULTS.map(d => `\n    <div class=\"mw-row\">\n      <div class=\"mw-label\">${d.label}\n        <span class=\"mw-sub\">${d.sub}<\u002Fspan>\n      <\u002Fdiv>\n      <input type=\"range\" class=\"mw-slider\" min=\"0\" max=\"100\" step=\"1\" value=\"${d.w}\"\n             data-key=\"${d.key}\" oninput=\"mwOnSlide('${d.key}', this.value)\">\n      <div class=\"mw-val\">\n        <input type=\"number\" min=\"0\" max=\"100\" step=\"1\" value=\"${d.w}\"\n               data-key=\"${d.key}\" oninput=\"mwOnNum('${d.key}', this.value)\">\n        <span class=\"mw-pct\">%<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  `).join('');\n  mwUpdateSum();\n}\n\nfunction mwOnSlide(key, val) {\n  const row = document.querySelector(`.mw-row input[type=\"number\"][data-key=\"${key}\"]`);\n  if (row) row.value = val;\n  mwUpdateSum();\n}\nfunction mwOnNum(key, val) {\n  const v = Math.max(0, Math.min(100, parseInt(val) || 0));\n  const row = document.querySelector(`.mw-row input[type=\"range\"][data-key=\"${key}\"]`);\n  if (row) row.value = v;\n  mwUpdateSum();\n}\n\nfunction mwCurrent() {\n  const vals = {};\n  document.querySelectorAll('#mw-sliders input[type=\"range\"]').forEach(i => {\n    vals[i.dataset.key] = parseInt(i.value) || 0;\n  });\n  return vals;\n}\n\nfunction mwUpdateSum() {\n  const vals = mwCurrent();\n  const sum = Object.values(vals).reduce((a,b)=>a+b,0);\n  const el = document.getElementById('mw-sum');\n  const hint = document.getElementById('mw-sum-hint');\n  const save = document.getElementById('mw-save');\n  if (!el) return;\n  el.textContent = sum;\n  if (sum === 100) {\n    el.style.color = 'var(--green)';\n    hint.textContent = '✓ gültig';\n    hint.style.color = 'var(--text-mid)';\n    if (save) { save.disabled = false; save.style.opacity = 1; }\n  } else {\n    el.style.color = 'var(--red)';\n    hint.textContent = sum > 100 ? `− ${sum-100} zu viel` : `+ ${100-sum} fehlen`;\n    hint.style.color = 'var(--red)';\n    if (save) { save.disabled = true; save.style.opacity = 0.5; }\n  }\n}\n\nfunction mwReset() {\n  MW_DEFAULTS.forEach(d => {\n    const r = document.querySelector(`.mw-row input[type=\"range\"][data-key=\"${d.key}\"]`);\n    const n = document.querySelector(`.mw-row input[type=\"number\"][data-key=\"${d.key}\"]`);\n    if (r) r.value = d.w;\n    if (n) n.value = d.w;\n  });\n  mwUpdateSum();\n  showToast('↺ Gewichte auf Default zurückgesetzt');\n}\n\nfunction mwNormalize() {\n  const vals = mwCurrent();\n  const sum = Object.values(vals).reduce((a,b)=>a+b,0);\n  if (sum === 0) { mwReset(); return; }\n  const keys = Object.keys(vals);\n  // Proportional skalieren, dann Rundungs-Rest auf die grösste Position\n  const scaled = {};\n  let newSum = 0;\n  keys.forEach(k => { scaled[k] = Math.round(vals[k] * 100 / sum); newSum += scaled[k]; });\n  const diff = 100 - newSum;\n  if (diff !== 0) {\n    const biggest = keys.sort((a,b) => scaled[b]-scaled[a])[0];\n    scaled[biggest] += diff;\n  }\n  keys.forEach(k => {\n    const r = document.querySelector(`.mw-row input[type=\"range\"][data-key=\"${k}\"]`);\n    const n = document.querySelector(`.mw-row input[type=\"number\"][data-key=\"${k}\"]`);\n    if (r) r.value = scaled[k];\n    if (n) n.value = scaled[k];\n  });\n  mwUpdateSum();\n  showToast('✓ Auf Summe 100 normalisiert');\n}\n\nfunction mwSave() {\n  const vals = mwCurrent();\n  const sum = Object.values(vals).reduce((a,b)=>a+b,0);\n  if (sum !== 100) return;\n  showToast('✓ Matching-Gewichte gespeichert · Scope Tenant · matching_weights_v2');\n}\n\nmwRender();\n\n/* ═══════════ Tab 1 · Sec-Group-Drill-Down ═══════════ */\nfunction openSecDrill(id, title) {\n  const src = document.getElementById(id);\n  const drill = document.getElementById('secDrill');\n  const body = document.getElementById('secDrillBody');\n  const crumb = document.getElementById('secDrillCrumb');\n  const titleEl = document.getElementById('secDrillTitle');\n  if (!src || !drill) return;\n  // Decode HTML-entities in title (&amp; → &)\n  const cleanTitle = title.replace(/&amp;/g, '&');\n  crumb.textContent = cleanTitle;\n  titleEl.textContent = cleanTitle;\n  // Inhalt der sec-group clonen, damit Source im Store bleibt\n  body.innerHTML = '';\n  const clone = src.cloneNode(true);\n  clone.removeAttribute('id');\n  body.appendChild(clone);\n  // sec-group-head im Drill einblenden (wir blenden per CSS aus, aber Inhalte drunter sollen offen sein)\n  drill.classList.add('open');\n  document.body.style.overflow = 'hidden';\n  // Matching-Gewichte: Slider müssen neu gerendert werden im Clone\n  if (id === 'matching-weights-group') {\n    const newHost = clone.querySelector('#mw-sliders');\n    if (newHost) {\n      newHost.id = 'mw-sliders-drill';\n      // Slider im Drill rendern\n      newHost.innerHTML = MW_DEFAULTS.map(d => `\n        <div class=\"mw-row\">\n          <div class=\"mw-label\">${d.label}<span class=\"mw-sub\">${d.sub}<\u002Fspan><\u002Fdiv>\n          <input type=\"range\" class=\"mw-slider\" min=\"0\" max=\"100\" step=\"1\" value=\"${d.w}\"\n                 data-key=\"${d.key}\" oninput=\"mwOnSlideDrill('${d.key}', this.value)\">\n          <div class=\"mw-val\">\n            <input type=\"number\" min=\"0\" max=\"100\" step=\"1\" value=\"${d.w}\"\n                   data-key=\"${d.key}\" oninput=\"mwOnNumDrill('${d.key}', this.value)\">\n            <span class=\"mw-pct\">%<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      `).join('');\n      // Summen-IDs im Clone umbenennen, damit updateSum funktioniert\n      const sumEl = clone.querySelector('#mw-sum');\n      const hintEl = clone.querySelector('#mw-sum-hint');\n      const saveBtn = clone.querySelector('#mw-save');\n      if (sumEl) sumEl.id = 'mw-sum-drill';\n      if (hintEl) hintEl.id = 'mw-sum-hint-drill';\n      if (saveBtn) saveBtn.id = 'mw-save-drill';\n      // Reset/Normalize-Buttons im Drill auf Drill-Varianten umbiegen\n      clone.querySelectorAll('button[onclick*=\"mwReset\"]').forEach(b => b.setAttribute('onclick','mwResetDrill()'));\n      clone.querySelectorAll('button[onclick*=\"mwNormalize\"]').forEach(b => b.setAttribute('onclick','mwNormalizeDrill()'));\n      mwUpdateSumDrill();\n    }\n  }\n}\n\nfunction closeSecDrill() {\n  const drill = document.getElementById('secDrill');\n  if (drill) drill.classList.remove('open');\n  document.body.style.overflow = '';\n}\n\n// ESC schliesst Drill\ndocument.addEventListener('keydown', (e) => {\n  if (e.key === 'Escape') closeSecDrill();\n});\n\n/* Drill-Varianten der Matching-Gewichte-Funktionen */\nfunction mwCurrentDrill() {\n  const vals = {};\n  document.querySelectorAll('#mw-sliders-drill input[type=\"range\"]').forEach(i => {\n    vals[i.dataset.key] = parseInt(i.value) || 0;\n  });\n  return vals;\n}\nfunction mwOnSlideDrill(key, val) {\n  const row = document.querySelector(`#mw-sliders-drill input[type=\"number\"][data-key=\"${key}\"]`);\n  if (row) row.value = val;\n  mwUpdateSumDrill();\n}\nfunction mwOnNumDrill(key, val) {\n  const v = Math.max(0, Math.min(100, parseInt(val) || 0));\n  const row = document.querySelector(`#mw-sliders-drill input[type=\"range\"][data-key=\"${key}\"]`);\n  if (row) row.value = v;\n  mwUpdateSumDrill();\n}\nfunction mwUpdateSumDrill() {\n  const vals = mwCurrentDrill();\n  const sum = Object.values(vals).reduce((a,b)=>a+b,0);\n  const el = document.getElementById('mw-sum-drill');\n  const hint = document.getElementById('mw-sum-hint-drill');\n  const save = document.getElementById('mw-save-drill');\n  if (!el) return;\n  el.textContent = sum;\n  if (sum === 100) {\n    el.style.color = 'var(--green)';\n    hint.textContent = '✓ gültig';\n    hint.style.color = 'var(--text-mid)';\n    if (save) { save.disabled = false; save.style.opacity = 1; }\n  } else {\n    el.style.color = 'var(--red)';\n    hint.textContent = sum > 100 ? `− ${sum-100} zu viel` : `+ ${100-sum} fehlen`;\n    hint.style.color = 'var(--red)';\n    if (save) { save.disabled = true; save.style.opacity = 0.5; }\n  }\n}\nfunction mwResetDrill() {\n  MW_DEFAULTS.forEach(d => {\n    const r = document.querySelector(`#mw-sliders-drill input[type=\"range\"][data-key=\"${d.key}\"]`);\n    const n = document.querySelector(`#mw-sliders-drill input[type=\"number\"][data-key=\"${d.key}\"]`);\n    if (r) r.value = d.w;\n    if (n) n.value = d.w;\n  });\n  mwUpdateSumDrill();\n  showToast('↺ Gewichte auf Default zurückgesetzt');\n}\nfunction mwNormalizeDrill() {\n  const vals = mwCurrentDrill();\n  const sum = Object.values(vals).reduce((a,b)=>a+b,0);\n  if (sum === 0) { mwResetDrill(); return; }\n  const keys = Object.keys(vals);\n  const scaled = {}; let newSum = 0;\n  keys.forEach(k => { scaled[k] = Math.round(vals[k] * 100 / sum); newSum += scaled[k]; });\n  const diff = 100 - newSum;\n  if (diff !== 0) {\n    const biggest = keys.sort((a,b) => scaled[b]-scaled[a])[0];\n    scaled[biggest] += diff;\n  }\n  keys.forEach(k => {\n    const r = document.querySelector(`#mw-sliders-drill input[type=\"range\"][data-key=\"${k}\"]`);\n    const n = document.querySelector(`#mw-sliders-drill input[type=\"number\"][data-key=\"${k}\"]`);\n    if (r) r.value = scaled[k];\n    if (n) n.value = scaled[k];\n  });\n  mwUpdateSumDrill();\n  showToast('✓ Auf Summe 100 normalisiert');\n}\n\n// === GLOBALE ADMIN-SUCHE ===\n// Durchsucht alle Panels + Sub-Panels, hebt Treffer-Zeilen hervor,\n// zählt Hits pro Tab und springt optional automatisch in Tab mit meisten Treffern.\nfunction adminGlobalFilter(q) {\n  q = (q || '').trim().toLowerCase();\n  const scope = document.getElementById('adminGlobalScope').value;\n  const hitsEl = document.getElementById('adminGlobalHits');\n  let total = 0;\n  const perTab = {};\n\n  // Alle interaktiven Datenzeilen (Flag-Rows, dt-Tables, .kpi etc. pro Tab-Panel)\n  document.querySelectorAll('.tab-panel').forEach(panel => {\n    const tabId = panel.id.replace('tab-','');\n    if (scope && tabId !== scope) {\n      panel.querySelectorAll('.flag-row, .dt-table tbody tr').forEach(r => r.style.display = 'none');\n      return;\n    }\n    let tabHits = 0;\n    panel.querySelectorAll('.flag-row, .dt-table tbody tr').forEach(row => {\n      const txt = row.textContent.toLowerCase();\n      const match = !q || txt.includes(q);\n      row.style.display = match ? '' : 'none';\n      if (match && q) tabHits++;\n    });\n    perTab[tabId] = tabHits;\n    total += tabHits;\n  });\n\n  // Hit-Counter im Banner\n  if (!q) { hitsEl.textContent = ''; return; }\n  const parts = Object.entries(perTab).filter(([,n]) => n>0).map(([t,n]) => `T${t}:${n}`);\n  hitsEl.textContent = total + ' Treffer' + (parts.length ? ' · ' + parts.join(' · ') : '');\n\n  // Auto-Tab-Switch zum Bereich mit meisten Hits\n  if (total > 0 && !scope) {\n    const best = Object.entries(perTab).sort((a,b) => b[1]-a[1])[0];\n    if (best && best[1] > 0 && typeof switchTab === 'function') switchTab(parseInt(best[0]));\n  }\n}\n// ⌘K / Ctrl-K → Fokus auf globale Suche\ndocument.addEventListener('keydown', e => {\n  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {\n    e.preventDefault();\n    document.getElementById('adminGlobalSearch')?.focus();\n  }\n});\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
